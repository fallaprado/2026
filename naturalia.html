    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; }
        
        /* Centrat de la capçalera */
        .header { 
            text-align: center; 
            margin-bottom: 20px; 
            color: #2c3e50;
        }

        #map { height: 75vh; width: 100%; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        /* Estils de les finestretes (Popups) */
        .popup-container { width: 200px; text-align: center; }
        .popup-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 8px; background: #ddd; }
        .popup-title { font-weight: bold; font-size: 16px; margin: 5px 0; color: #333; }
        .popup-data { font-size: 13px; color: #666; font-style: italic; margin-top: 5px; border-top: 1px solid #eee; padding-top: 5px; }
    </style>

<body>

    <div class="header">
        <h1>📍 Naturàlia Tavernes de la Valldigna</h1>
        <p><strong>Descobreix l'essència de la Valldigna: de la festa de les nostres Falles als racons més purs de la nostra natura.</strong></p>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicialització del mapa
        var map = L.map('map').setView([39.072, -0.266], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Funció per crear les icones de colors
        function crearIcona(color) {
            var iconName = (color === 'marro') ? 'orange' : color; 
            if(color === 'roig') iconName = 'red';
            if(color === 'blau') iconName = 'blue';
            if(color === 'verd') iconName = 'green';

            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${iconName}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
        }

        // Funció per afegir punts amb Imatge i Dada Interessant
        function afegirPunt(lat, lng, color, titol, imgUrl, dada) {
            var contingut = `
                <div class="popup-container">
                    <div class="popup-title">${titol}</div>
                    <img src="${imgUrl}" class="popup-img" alt="${titol}" onerror="this.src='https://via.placeholder.com/200x120?text=Imatge+pendent'">
                    <div class="popup-data">${dada}</div>
                </div>
            `;
            L.marker([lat, lng], {icon: crearIcona(color)})
             .addTo(map)
             .bindPopup(contingut);
        }
