<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audioguia Multilingüe</title>
    <style>
        /* Estils Generals */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f5; /* Vermell molt suau */
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 150px;
            height: auto;
            border-radius: 10px;
        }

        h1 {
            font-size: 1.5rem;
            color: #8b0000; /* Un granat per contrastar amb el fons suau */
        }

        /* Contenidor de les pistes */
        .audio-container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .track {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0e0e0;
        }

        .track:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .language-label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        /* Estil per a l'àrab (dreta a esquerra) */
        .rtl {
            direction: rtl;
            text-align: right;
        }
    </style>
</head>
<body>

    <header>
        <img src="escut.png" alt="Logotip Audioguia" class="logo">
        <h1>Audioguia del Museu</h1>
    </header>

    <div class="audio-container">
        
        <div class="track">
            <span class="language-label"> Valencià</span>
            <audio controls>
                <source src="val.mp3" type="audio/mpeg">
                El teu navegador no suporta l'element d'àudio.
            </audio>
        </div>

        <div class="track">
            <span class="language-label"> Castellano</span>
            <audio controls>
                <source src="cas.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="track rtl">
            <span class="language-label">العربية (Àrab)</span>
            <audio controls>
                <source src="ara.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="track">
            <span class="language-label"> English</span>
            <audio controls>
                <source src="ang.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="track">
            <span class="language-label"> Français</span>
            <audio controls>
                <source src="fra.mp3" type="audio/mpeg">
            </audio>
        </div>

    </div>

    <footer style="margin-top: 40px; font-size: 0.8rem; color: #999;">
        &copy; 2024 Audioguia Interactiva
    </footer>

</body>
</html>
