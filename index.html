<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>· Passaport Faller Falla Prado 2026 ·</title>

<style>

html{scroll-behavior:smooth;}

body{
font-family:Arial;
margin:0;
background:#f4f1e8;
text-align:center;
overflow-x:hidden;
}

.logo{
width:130px;
margin:30px auto;
display:block;
}

nav{
background:white;
padding:15px;
border-top:2px solid #ddd;
border-bottom:2px solid #ddd;
position:sticky;
top:0;
z-index:100;
}

nav ul{
display:flex;
justify-content:center;
gap:40px;
list-style:none;
padding:0;
margin:0;
}

nav a{
text-decoration:none;
font-weight:bold;
color:darkred;
font-size:18px;
}

.contador{
margin:20px;
font-size:22px;
font-weight:bold;
}

section{
padding:60px 20px;
}

#FallaPradoenRoig{background:#ffd6d6;}
#FallaPradoenBlau{background:#d6e6ff;}
#FallaPradoenVerd{background:#d6ffd9;}
#FallaPradoenMarro{background:#f0e0c9;}

.llocs{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.lloc{
background:white;
width:260px;
border-radius:12px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
position:relative;
}

.lloc img{
width:100%;
border-radius:8px;
}

button{
padding:10px 15px;
border:none;
background:darkred;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:6px;
}

.segell{
position:absolute;
top:15px;
right:15px;
width:90px;
height:90px;
border:5px solid red;
border-radius:50%;
color:red;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
transform:rotate(-20deg) scale(2);
background:rgba(255,0,0,0.1);
opacity:0;
}

.segell.animar{
animation:segellStamp 0.5s ease-out forwards;
}

@keyframes segellStamp{

0%{transform:rotate(-20deg) scale(3);opacity:0;}
50%{transform:rotate(-20deg) scale(0.8);opacity:1;}
80%{transform:rotate(-20deg) scale(1.1);}
100%{transform:rotate(-20deg) scale(1);opacity:1;}

}

.coet{
position:fixed;
bottom:-20px;
width:4px;
height:22px;
background:white;
z-index:9999;
}

.particula{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
z-index:9999;
}

/* TREMOLOR */

@keyframes tremolor{

0%{transform:translate(0,0)}
25%{transform:translate(3px,-3px)}
50%{transform:translate(-3px,3px)}
75%{transform:translate(3px,3px)}
100%{transform:translate(0,0)}

}

.tremolar{
animation:tremolor 0.3s linear 6;
}

</style>
</head>

<body>

<img class="logo" src="https://fallaprado.github.io/2026/escut2.png">

<nav>
<ul>
<li><a href="#FallaPradoenRoig">#FallaPradoenRoig</a></li>
<li><a href="#FallaPradoenBlau">#FallaPradoenBlau</a></li>
<li><a href="#FallaPradoenVerd">#FallaPradoenVerd</a></li>
<li><a href="#FallaPradoenMarro">#FallaPradoenMarro</a></li>
</ul>
</nav>

<div class="contador">
Segells aconseguits: <span id="contador">0</span> / 24
</div>

<audio id="soMascleta" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f4c2c8df3.mp3?filename=firework-explosion-109497.mp3"></audio>

<script>

const llocs={
prado:{lat:39.0709,lon:-0.2619},
passeig:{lat:39.0698,lon:-0.2684},
dula:{lat:39.0758,lon:-0.2621},
cambro:{lat:39.0700,lon:-0.2695},
via:{lat:39.0694,lon:-0.2666},
portal:{lat:39.0733,lon:-0.2638},

platja:{lat:39.0877,lon:-0.21579},
ullal:{lat:39.08118,lon:-0.241175},
riuvaca:{lat:39.06692,lon:-0.26709},
clot:{lat:39.05684,lon:-0.27459},
goleta:{lat:39.10282,lon:-0.22225},
cantus:{lat:39.10264,lon:-0.22233},

creus:{lat:39.07945,lon:-0.27773},
esther:{lat:39.07945,lon:-0.27773},
mirador:{lat:39.08471,lon:-0.24889},
cadireta:{lat:39.05726,lon:-0.25763},
dunar:{lat:39.07711,lon:-0.20979},
viaverda:{lat:39.06961,lon:-0.28339},

esglesia:{lat:39.07256,lon:-0.2673},
ajuntament:{lat:39.07159,lon:-0.26767},
torre:{lat:39.08598,lon:-0.21781},
mercat:{lat:39.071933,lon:-0.26550},
ermita:{lat:39.08223,lon:-0.25571},
calvari:{lat:39.07510,lon:-0.26909}
};

function obtenirVisitats(){
const dades=localStorage.getItem("segellsVisitats");
return dades ? JSON.parse(dades) : [];
}

function guardarVisitats(llista){
localStorage.setItem("segellsVisitats",JSON.stringify(llista));
}

function comprovarUbicacio(clau,nom){

navigator.geolocation.getCurrentPosition(function(pos){

const latU=pos.coords.latitude;
const lonU=pos.coords.longitude;

const latL=llocs[clau].lat;
const lonL=llocs[clau].lon;

const dist=calcularDistancia(latU,lonU,latL,lonL);

if(dist<0.2){
desbloquejarSegell(clau);
alert("✅ Segell desbloquejat a "+nom);
}else{
alert("❌ Has d'estar a menys de 200 metres");
}

});

}

function desbloquejarSegell(clau){

let visitats=obtenirVisitats();

if(!visitats.includes(clau)){

visitats.push(clau);
guardarVisitats(visitats);

actualitzarContador();

mascletaCoets();

}

}

function calcularDistancia(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

function actualitzarContador(){
const visitats=obtenirVisitats();
document.getElementById("contador").innerText=visitats.length;
}

function mascletaCoets(){

for(let i=0;i<6;i++){

setTimeout(()=>{

const coet=document.createElement("div");
coet.className="coet";

const posX=Math.random()*100;

coet.style.left=posX+"vw";

document.body.appendChild(coet);

const altura=window.innerHeight*(0.4+Math.random()*0.4);

coet.animate([
{transform:"translateY(0)"},
{transform:`translateY(-${altura}px)`}
],{
duration:900,
easing:"ease-out"
});

setTimeout(()=>{

explosio(posX,altura);
coet.remove();

},900);

},i*180);

}

}

function explosio(x,altura){

const so=document.getElementById("soMascleta");
so.currentTime=0;
so.play();

document.body.classList.add("tremolar");

setTimeout(()=>{
document.body.classList.remove("tremolar");
},600);

for(let i=0;i<40;i++){

const p=document.createElement("div");
p.className="particula";

const color=`hsl(${Math.random()*360},100%,50%)`;

p.style.background=color;
p.style.left=x+"vw";
p.style.top=(window.innerHeight-altura)+"px";

document.body.appendChild(p);

const angle=Math.random()*2*Math.PI;
const distancia=80+Math.random()*120;

const dx=Math.cos(angle)*distancia;
const dy=Math.sin(angle)*distancia;

const duracio=800+Math.random()*400;

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}
],{
duration:duracio,
easing:"ease-out"
});

setTimeout(()=>p.remove(),duracio);

}

}

</script>

</body>
</html>
